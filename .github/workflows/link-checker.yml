name: Weekly Link Check

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --accept 200,204,206,301,302,307,308,403
            --timeout 30
            --max-retries 3
            --exclude-mail
            --exclude 'tornadocash.eth.link'
            --exclude 'localhost'
            --exclude '127.0.0.1'
            README.md
          fail: false

      - name: Read lychee output
        id: results
        run: |
          if [ -f ./lychee/out.md ]; then
            BROKEN=$(grep -c '\[ERR\]\|❌\|✗' ./lychee/out.md 2>/dev/null || echo "0")
            echo "broken_count=$BROKEN" >> $GITHUB_OUTPUT
          else
            echo "broken_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Create issue for broken links
        if: steps.results.outputs.broken_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if there's already an open issue for broken links
          EXISTING=$(gh issue list --label "dead-link" --state open --limit 1 --json number -q '.[0].number' 2>/dev/null || echo "")

          BODY="## Weekly Link Check — $(date +%Y-%m-%d)

          The automated link checker found broken or unreachable URLs in the directory.

          <details>
          <summary>Full report</summary>

          $(cat ./lychee/out.md 2>/dev/null || echo 'No detailed output available.')

          </details>

          ---
          *This issue was created automatically by the weekly link checker.*"

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "Broken links detected — $(date +%Y-%m-%d)" \
              --body "$BODY" \
              --label "dead-link,maintenance"
          fi
