name: PR Auto-Review

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr-diff.txt

      - name: Review PR against guardrails
        id: review
        run: |
          ISSUES=""
          WARNINGS=""

          # Only check added lines
          grep -E '^\+' /tmp/pr-diff.txt > /tmp/additions.txt || true

          # 1. Affiliate/referral links — community PRs must not include these
          if grep -iE '(ref=|referral|affiliate|aff_id|utm_source|utm_medium|invite\.|\.go\.link)' /tmp/additions.txt > /dev/null 2>&1; then
            ISSUES="${ISSUES}
          - **Affiliate link detected.** Community submissions must not contain affiliate/referral links. Only maintainers may add these (see [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md))."
          fi

          # 2. Service providers — residency, incorporation, consulting, tax advisory
          if grep -iE '(residency program|incorporation service|company formation service|tax advisory|consulting firm|visa service|immigration service)' /tmp/additions.txt > /dev/null 2>&1; then
            ISSUES="${ISSUES}
          - **Service provider detected.** This directory covers tools and platforms only. Residency, incorporation, consulting, and tax advisory services are not accepted as community submissions."
          fi

          # 3. Polystate Paid Services section — off limits
          if grep -iE '(## Polystate Paid Services|Digital Notary \(Notarity\)|Intelligence Features)' /tmp/additions.txt > /dev/null 2>&1; then
            ISSUES="${ISSUES}
          - **Polystate Paid Services section modified.** This section is maintained exclusively by Polystate and should not be modified by community contributors."
          fi

          # 4. Scam / hype patterns
          if grep -iE '(guaranteed returns|100x|get rich|free money|airdrop claim|double your|risk.free|ponzi)' /tmp/additions.txt > /dev/null 2>&1; then
            ISSUES="${ISSUES}
          - **Suspicious content detected.** Entry contains promotional language or potential scam indicators."
          fi

          # 5. Competing paid services — direct competitors to Polystate core offerings
          if grep -iE '(paraguay residency|panama residency|georgia residency|prospera residency|LLC formation|company registration|e-residency)' /tmp/additions.txt > /dev/null 2>&1; then
            ISSUES="${ISSUES}
          - **Competing service detected.** Submissions that directly compete with Polystate's paid services (residency programs, company formation) are not accepted in the community directory."
          fi

          # 6. Proper table format in community directory section
          if grep -E '^\+\|' /tmp/additions.txt > /dev/null 2>&1; then
            if ! grep -E '^\+\| [0-9]' /tmp/additions.txt > /dev/null 2>&1; then
              WARNINGS="${WARNINGS}
          - **Format check:** Ensure entries follow the numbered table format: \`| # | Tool Name | Description | [link](url) | Status |\`"
            fi
          fi

          # 7. Missing clickable link
          if grep -E '^\+\|.*\|.*\|.*\|' /tmp/additions.txt | grep -vE '\[.*\]\(http' > /dev/null 2>&1; then
            WARNINGS="${WARNINGS}
          - **Missing link:** Some entries may be missing a clickable URL in markdown format."
          fi

          # 8. Duplicate tool check — see if tool name already exists in README
          NEW_TOOLS=$(grep -oP '^\+\| [0-9]+ \| \K[^|]+' /tmp/additions.txt 2>/dev/null | sed 's/^ *//;s/ *$//' || true)
          if [ -n "$NEW_TOOLS" ]; then
            while IFS= read -r tool; do
              if [ -n "$tool" ] && grep -qi "| ${tool} |" README.md 2>/dev/null; then
                WARNINGS="${WARNINGS}
          - **Possible duplicate:** \"${tool}\" may already exist in the directory."
              fi
            done <<< "$NEW_TOOLS"
          fi

          # Build the review comment
          if [ -n "$ISSUES" ]; then
            {
              echo "## PR Auto-Review"
              echo ""
              echo "**Issues found — this PR needs changes before it can be merged:**"
              echo "$ISSUES"
              echo ""
              echo "Please fix these issues and update your PR. See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for guidelines."
            } > /tmp/review-comment.txt
            echo "status=BLOCKED" >> $GITHUB_OUTPUT
          elif [ -n "$WARNINGS" ]; then
            {
              echo "## PR Auto-Review"
              echo ""
              echo "**No blocking issues.** A few things to double-check:"
              echo "$WARNINGS"
              echo ""
              echo "A maintainer will review this shortly."
            } > /tmp/review-comment.txt
            echo "status=WARNINGS" >> $GITHUB_OUTPUT
          else
            {
              echo "## PR Auto-Review"
              echo ""
              echo "**Looks good!** No guardrail violations detected. A maintainer will review this shortly."
            } > /tmp/review-comment.txt
            echo "status=CLEAN" >> $GITHUB_OUTPUT
          fi

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/review-comment.txt
